<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/bioasistencia_error.log
    CustomLog ${APACHE_LOG_DIR}/bioasistencia_access.log combined
</VirtualHost>
