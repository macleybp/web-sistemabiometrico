services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: bioasistencia-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=bioasistencia
      - DB_USER=root
      - DB_PASS=123456
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: bioasistencia-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: bioasistencia
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
