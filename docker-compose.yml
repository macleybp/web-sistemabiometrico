services:
  db:
    image: mysql:8.0
    container_name: bioasistencia-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-123456}
      MYSQL_DATABASE: ${DB_NAME:-bioasistencia}
      TZ: America/Lima
    ports:
      - "3307:3306"
    volumes:
      - bioasistencia_db:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-bioasistencia.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASS:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 15

  web:
    build: .
    container_name: bioasistencia-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-bioasistencia}
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASS:-123456}
      ARDUINO_API_KEY: "${ARDUINO_API_KEY:-}"
      APP_URL: ""
      TZ: America/Lima
    ports:
      - "8080:80"

volumes:
  bioasistencia_db:
